<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg5" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#e8e4d8"/>
      <stop offset="100%" stop-color="#d8d4c8"/>
    </radialGradient>
    <radialGradient id="glass" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#f5f2ec"/>
      <stop offset="100%" stop-color="#d5d0c5"/>
    </radialGradient>
    <radialGradient id="sand" cx="45%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#e0ddd5"/>
      <stop offset="100%" stop-color="#a8a59c"/>
    </radialGradient>
    <filter id="shadow5" x="-20%" y="-10%" width="140%" height="140%">
      <feDropShadow dx="4" dy="8" stdDeviation="12" flood-color="#a0a090" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="400" height="400" fill="url(#bg5)"/>
  <g filter="url(#shadow5)">
    <!-- Top frame -->
    <rect x="140" y="90" width="120" height="14" rx="4" fill="url(#glass)"/>
    <!-- Bottom frame -->
    <rect x="140" y="296" width="120" height="14" rx="4" fill="url(#glass)"/>
    <!-- Top bulb -->
    <path d="M165 104 Q165 180 200 200 Q235 180 235 104 Z" fill="url(#glass)"/>
    <!-- Bottom bulb -->
    <path d="M165 296 Q165 220 200 200 Q235 220 235 296 Z" fill="url(#glass)"/>
    <!-- Sand top -->
    <path d="M180 130 Q180 175 200 190 Q220 175 220 130 Z" fill="url(#sand)"/>
    <!-- Sand bottom pile -->
    <path d="M175 296 Q175 260 200 250 Q225 260 225 296 Z" fill="url(#sand)"/>
    <!-- Sand stream -->
    <rect x="197" y="190" width="6" height="60" fill="url(#sand)"/>
    <!-- Highlight -->
    <ellipse cx="185" cy="135" rx="6" ry="10" fill="#eae8e0" opacity="0.5"/>
  </g>
</svg>
