<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg2" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#e8e4d8"/>
      <stop offset="100%" stop-color="#d8d4c8"/>
    </radialGradient>
    <radialGradient id="circle-fill" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#f0ede5"/>
      <stop offset="100%" stop-color="#ccc8bc"/>
    </radialGradient>
    <radialGradient id="play-fill" cx="45%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#d8d5cc"/>
      <stop offset="100%" stop-color="#a8a59c"/>
    </radialGradient>
    <filter id="shadow2" x="-20%" y="-10%" width="140%" height="140%">
      <feDropShadow dx="4" dy="8" stdDeviation="14" flood-color="#a0a090" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="400" height="400" fill="url(#bg2)"/>
  <g filter="url(#shadow2)">
    <!-- Outer circle -->
    <circle cx="200" cy="200" r="95" fill="url(#circle-fill)"/>
    <!-- Inner ring -->
    <circle cx="200" cy="200" r="78" fill="none" stroke="#d5d0c5" stroke-width="3"/>
    <!-- Play triangle -->
    <polygon points="178,150 178,250 258,200" fill="url(#play-fill)"/>
    <!-- Play highlight -->
    <polygon points="183,160 183,240 248,200" fill="none" stroke="#e0ddd5" stroke-width="2" opacity="0.5"/>
  </g>
</svg>