<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#e8e4d8"/>
      <stop offset="100%" stop-color="#d8d4c8"/>
    </radialGradient>
    <radialGradient id="body" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#f5f2ec"/>
      <stop offset="100%" stop-color="#d5d0c5"/>
    </radialGradient>
    <radialGradient id="lens" cx="45%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#e0ddd5"/>
      <stop offset="100%" stop-color="#b0ada5"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-10%" width="140%" height="140%">
      <feDropShadow dx="4" dy="8" stdDeviation="12" flood-color="#a0a090" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <!-- Camera body -->
    <rect x="105" y="155" width="190" height="140" rx="18" fill="url(#body)"/>
    <!-- Viewfinder bump -->
    <rect x="160" y="130" width="60" height="35" rx="8" fill="url(#body)"/>
    <!-- Lens outer ring -->
    <circle cx="200" cy="225" r="48" fill="url(#lens)"/>
    <!-- Lens inner -->
    <circle cx="200" cy="225" r="32" fill="#c8c4b8"/>
    <!-- Lens highlight -->
    <circle cx="200" cy="225" r="18" fill="#dddaD0"/>
    <circle cx="190" cy="215" r="6" fill="#eae8e0" opacity="0.7"/>
    <!-- Flash -->
    <rect x="245" y="160" width="20" height="12" rx="4" fill="#dddaD0"/>
  </g>
</svg>