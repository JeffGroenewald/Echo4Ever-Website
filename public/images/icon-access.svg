<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg4" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#e8e4d8"/>
      <stop offset="100%" stop-color="#d8d4c8"/>
    </radialGradient>
    <radialGradient id="key" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#f5f2ec"/>
      <stop offset="100%" stop-color="#d5d0c5"/>
    </radialGradient>
    <radialGradient id="keyring" cx="45%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#e0ddd5"/>
      <stop offset="100%" stop-color="#a8a59c"/>
    </radialGradient>
    <filter id="shadow4" x="-20%" y="-10%" width="140%" height="140%">
      <feDropShadow dx="4" dy="8" stdDeviation="12" flood-color="#a0a090" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="400" height="400" fill="url(#bg4)"/>
  <g filter="url(#shadow4)">
    <!-- Key ring -->
    <circle cx="170" cy="155" r="45" fill="none" stroke="url(#key)" stroke-width="18"/>
    <circle cx="170" cy="155" r="20" fill="url(#keyring)"/>
    <!-- Key shaft -->
    <rect x="210" y="146" width="100" height="18" rx="4" fill="url(#key)"/>
    <!-- Key teeth -->
    <rect x="280" y="164" width="14" height="24" rx="3" fill="url(#key)"/>
    <rect x="260" y="164" width="14" height="18" rx="3" fill="url(#key)"/>
    <rect x="300" y="164" width="14" height="30" rx="3" fill="url(#key)"/>
    <!-- Highlight -->
    <circle cx="160" cy="145" r="8" fill="#eae8e0" opacity="0.6"/>
  </g>
</svg>
